<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Vendedor - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .product-list { display: flex; flex-direction: column; gap: 10px; }
        .product-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: none; background: #ea1d2c; color: white; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="ui-store-name">Carregando...</h1>
        <button onclick="window.logoutStore()">Sair</button>
    </div>

    <div>
        <label>Status da Loja: </label>
        <input type="checkbox" id="btn-toggle-status" onchange="window.toggleStoreStatus()">
    </div>

    <h2>Seu Cardápio</h2>
    <div id="product-list-container">Carregando produtos...</div>
</div>

<script type="module" src="vendedor.js"></script>
</body>
</html>
