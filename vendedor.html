<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Vendedor - UaiPede</title>
    <style>
        body { font-family: sans-serif; background: #f4f5f7; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .product-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .status-toggle { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="ui-store-name">Carregando...</h1>
    
    <div class="status-toggle">
        <label>Status da Loja: </label>
        <input type="checkbox" id="btn-toggle-status" onchange="window.toggleStoreStatus()">
    </div>

    <h2>Seu Cardápio</h2>
    <div id="product-list-container">Carregando produtos...</div>
</div>

<script type="module" src="vendedor.js"></script>
</body>
</html>
