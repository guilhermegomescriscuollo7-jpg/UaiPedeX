<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Cadastro - UaiPede</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --uai-red: #ea1d2c; --uai-dark: #111111; --uai-bg: #f8f9fa; --uai-white: #ffffff; --uai-gray: #717171; --uai-border: #eaeaea; --radius: 12px; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--uai-bg); color: var(--uai-dark); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .header { background-color: var(--uai-white); padding: 20px 0; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .logo-svg { width: 45px; height: auto; transform: rotate(-5deg); }
        .logo-text { font-size: 2rem; font-weight: 900; font-style: italic; letter-spacing: -1.5px; color: var(--uai-red); }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--uai-white); border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid var(--uai-border); }
        h1 { font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .intro-text { text-align: center; color: var(--uai-gray); margin-bottom: 40px; font-size: 0.95rem; line-height: 1.6; }
        .section-title { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 800; margin: 35px 0 20px 0; padding-bottom: 10px; border-bottom: 2px solid #f2f2f2; }
        .icon-svg { width: 24px; height: 24px; stroke: var(--uai-red); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }
        label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select, textarea { padding: 14px 16px; border: 1px solid #ddd; border-radius: var(--radius); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.3s; background: #fafafa; }
        input:focus, select:focus, textarea:focus { border-color: var(--uai-red); background: #fff; box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1); }
        .payment-box { background: #f9f9f9; padding: 20px; border-radius: var(--radius); border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; font-weight: 500; font-size: 0.9rem; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--uai-red); }
        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--uai-red), #ff4b58); color: white; border: none; padding: 18px; border-radius: var(--radius); font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 30px; box-shadow: 0 8px 20px rgba(234, 29, 44, 0.2); transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(234, 29, 44, 0.3); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        #loading-cities { font-size: 0.85rem; color: var(--uai-red); font-weight: 600; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .card { padding: 25px 20px; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 15 Q 50 55 95 15" stroke="#ea1d2c" stroke-width="12" stroke-linecap="round"/>
            </svg>
            <div class="logo-text">UaiPede</div>
        </a>
    </header>

    <div class="container">
        <div class="card">
            <h1>Cadastrar estabelecimento</h1>
            <p class="intro-text">
                Neste formulário, você adiciona as suas informações e agiliza o processo de adesão no UaiPede Delivery. 
                Qualquer dúvida, entraremos em contacto consigo!
            </p>

            <form id="form-cadastro">
                
                <div class="section-title">
                    <svg class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    Dados da Loja
                </div>
                
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Nome Fantasia da empresa</label>
                        <input type="text" id="cad-nome" placeholder="Nome que os clientes verão na App" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Envie a sua Logo (PNG, JPG, PDF)</label>
                        <input type="file" id="cad-logo" accept=".png, .jpg, .jpeg, .pdf" style="background: #fff; padding: 10px;" required>
                    </div>

                    <div class="form-group">
                        <label>Razão Social</label>
                        <input type="text" id="cad-razao" placeholder="Nome jurídico" required>
                    </div>
                    <div class="form-group">
                        <label>CNPJ / CPF</label>
                        <input type="text" id="cad-cnpj" placeholder="00.000.000/0000-00" required>
                    </div>
                    <div class="form-group">
                        <label>Nome do responsável</label>
                        <input type="text" id="cad-responsavel" placeholder="Nome completo" required>
                    </div>
                    <div class="form-group">
                        <label>Segmento principal</label>
                        <select id="cad-segmento" required>
                            <option value="">Selecione...</option>
                            <option>Restaurante</option>
                            <option>Lanches / Hamburgueria</option>
                            <option>Pizzaria</option>
                            <option>Açaí / Sorveteria</option>
                            <option>Mercado</option>
                            <option>Bebidas / Conveniência</option>
                            <option>Outros</option>
                        </select>
                    </div>
                </div>

                <div class="section-title">
                    <svg class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Localização
                </div>

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Cidade Atendida</label>
                        <select id="select-cidade" required>
                            <option value="">A carregar cidades...</option>
                        </select>
                        <span id="loading-cities">A ligar ao UaiPede...</span>
                    </div>
                    <div class="form-group full-width">
                        <label>Rua e Número</label>
                        <input type="text" id="cad-rua" placeholder="Ex: Av. Sete de Setembro, 450" required>
                    </div>
                    <div class="form-group">
                        <label>Bairro</label>
                        <input type="text" id="cad-bairro" required>
                    </div>
                    <div class="form-group">
                        <label>Complemento</label>
                        <input type="text" id="cad-complemento" placeholder="Opcional">
                    </div>
                </div>

                <div class="section-title">
                    <svg class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    Contacto & Delivery
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>WhatsApp (Coleta de Cardápio)</label>
                        <input type="tel" id="cad-whatsapp" placeholder="(00) 00000-0000" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail da Empresa (E-mail de Login)</label>
                        <input type="email" id="cad-email" placeholder="empresa@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha de Acesso</label>
                        <input type="password" id="cad-senha" placeholder="Mínimo 8 caracteres" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label>Prazo Médio Delivery (Minutos)</label>
                        <input type="number" id="cad-prazo" placeholder="Ex: 40" required>
                    </div>
                    <div class="form-group">
                        <label>Taxa de Entrega</label>
                        <input type="text" id="cad-taxa" placeholder="Ex: R$ 5,00 ou Grátis" required>
                    </div>
                </div>

                <div class="section-title">
                    <svg class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    Pagamentos Aceites
                </div>

                <div class="payment-box">
                    <label class="checkbox-item"><input type="checkbox" class="pag-check"> Dinheiro</label>
                    <label class="checkbox-item"><input type="checkbox" class="pag-check"> Cartão de Crédito (Máquina)</label>
                    <label class="checkbox-item"><input type="checkbox" class="pag-check"> Cartão de Débito (Máquina)</label>
                    <label class="checkbox-item"><input type="checkbox" class="pag-check" checked> PIX</label>
                </div>

                <div class="form-group full-width" style="margin-top: 25px;">
                    <label>Observações (Opcional)</label>
                    <textarea id="cad-obs" placeholder="Algum detalhe extra?"></textarea>
                </div>

                <button type="submit" id="btn-submit" class="btn-submit">Enviar Pedido de Registo</button>

            </form>
        </div>
    </div>

    <script type="module">
    import { supabase } from './js/supabase-client.js';

    // --- Load cities into <select> ---
    const citySelect  = document.getElementById('select-cidade');
    const loadingText = document.getElementById('loading-cities');

    if (citySelect) {
        const { data: cities, error: citiesError } = await supabase
            .from('cities')
            .select('*');

        if (cities && !citiesError) {
            cities.sort((a, b) => a.name.localeCompare(b.name));
            citySelect.innerHTML =
                '<option value="">Selecione a cidade...</option>' +
                cities.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
        if (loadingText) loadingText.style.display = 'none';
    }

    // --- Form submit ---
    const form      = document.getElementById('form-cadastro');
    const btnSubmit = document.getElementById('btn-submit');

    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name     = document.getElementById('cad-nome')?.value?.trim()       || '';
            const email    = document.getElementById('cad-email')?.value?.trim()      || '';
            const password = document.getElementById('cad-senha')?.value              || '';
            const phone    = document.getElementById('cad-whatsapp')?.value?.trim()   || '';
            const doc      = document.getElementById('cad-cnpj')?.value?.trim()       || '';
            const city     = citySelect?.value                                         || '';

            if (!name || !email || !password) {
                alert('Preencha todos os campos obrigatórios.');
                return;
            }

            if (btnSubmit) {
                btnSubmit.disabled  = true;
                btnSubmit.innerText = 'A Enviar...';
            }

            // 1. Create auth user
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email,
                password,
                options: { data: { name } }
            });

            if (authError) {
                alert('Erro ao criar conta: ' + authError.message);
                if (btnSubmit) {
                    btnSubmit.disabled  = false;
                    btnSubmit.innerText = 'Enviar Pedido de Registo';
                }
                return;
            }

            // 2. Insert store record linked to the new auth user
            const { error: storeError } = await supabase.from('stores').insert([{
                auth_id:       authData.user.id,
                name,
                email,
                phone,
                doc,
                city,
                segmento:      document.getElementById('cad-segmento')?.value     || '',
                razaoSocial:   document.getElementById('cad-razao')?.value        || '',
                responsavel:   document.getElementById('cad-responsavel')?.value  || '',
                ruaNumero:     document.getElementById('cad-rua')?.value          || '',
                bairro:        document.getElementById('cad-bairro')?.value       || '',
                complemento:   document.getElementById('cad-complemento')?.value  || '',
                prazoDelivery: document.getElementById('cad-prazo')?.value        || '',
                taxaEntrega:   document.getElementById('cad-taxa')?.value         || '',
                obs:           document.getElementById('cad-obs')?.value          || '',
                isActive:      false,
                status:        'pendente',
                createdAt:     new Date().toISOString()
            }]);

            if (storeError) {
                alert('Conta criada, mas erro ao guardar dados: ' + storeError.message);
                if (btnSubmit) {
                    btnSubmit.disabled  = false;
                    btnSubmit.innerText = 'Enviar Pedido de Registo';
                }
                return;
            }

            alert('Cadastro enviado com sucesso! Aguarde a aprovação do administrador.');
            form.reset();
            if (btnSubmit) {
                btnSubmit.disabled  = false;
                btnSubmit.innerText = 'Enviar Pedido de Registo';
            }
        });
    }
</script>
</body>
</html>
