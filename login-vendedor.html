<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login da Loja - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f4f5f7; display: flex; align-items: center; justify-content: center; height: 100vh; color: #333; }

        .login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        
        .logo-area { margin-bottom: 25px; }
        .logo-area svg { width: 50px; height: auto; transform: rotate(-10deg); margin-bottom: 10px; color: #ea1d2c; }
        .logo-area h1 { font-size: 1.5rem; color: #111; font-weight: 900; }
        .logo-area p { font-size: 0.9rem; color: #777; margin-top: 5px; }

        .alert-box { display: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; font-weight: bold; }
        .alert-error { background: #fef0f0; color: #ea1d2c; border: 1px solid #fbd5d5; }
        .alert-success { background: #e6f4ea; color: #00a14b; border: 1px solid #c3e6cb; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #555; font-weight: bold; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; background: #f9f9f9; transition: 0.2s; color: #333; }
        .form-group input:focus { border-color: #ea1d2c; background: #fff; }

        .btn-primary { width: 100%; background: #ea1d2c; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary:hover { background: #c81824; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-area">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <h1>Portal do Lojista</h1>
            <p>UaiPede</p>
        </div>

        <div id="alert-msg" class="alert-box"></div>

        <form id="login-form">
            <div class="form-group">
                <label>E-mail da Loja</label>
                <input type="email" id="email" placeholder="Digite o e-mail cadastrado" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="pass" placeholder="Digite a sua senha" required>
            </div>
            
            <button type="submit" class="btn-primary" id="btn-login">Entrar no Painel</button>
        </form>
    </div>

    <script type="module">
    import { supabase } from './js/supabase-client.js';
    import { saveStoreSession } from './js/auth.js';

    const { data: { session: existingSession } } = await supabase.auth.getSession();
    if (existingSession && existingSession.user.app_metadata?.role === 'store') {
        window.location.href = 'vendedor.html';
    }

    const form     = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');

    function showAlert(msg, type) {
        const alertBox = document.getElementById('alert-msg');
        if (!alertBox) return;
        alertBox.innerText = msg;
        alertBox.className = type === 'error' ? 'alert-box alert-error' : 'alert-box alert-success';
        alertBox.style.display = 'block';
    }

    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email')?.value?.trim();
            const pass  = document.getElementById('pass')?.value?.trim();
            if (!email || !pass) { showAlert('❌ Preencha todos os campos.', 'error'); return; }

            btnLogin.disabled  = true;
            btnLogin.innerText = 'Autenticando...';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

            if (error || data.user.app_metadata?.role !== 'store') {
                showAlert('❌ E-mail ou senha incorretos.', 'error');
                btnLogin.disabled  = false;
                btnLogin.innerText = 'Entrar no Painel';
                return;
            }

            if (data.user.app_metadata?.must_reset_password) {
                window.location.href = 'reset-password.html'; return;
            }

            const { data: profile } = await supabase
                .from('stores')
                .select('id, name, city, pixKey, dueDate, isActive')
                .eq('auth_id', data.user.id)
                .single();

            if (!profile || profile.isActive === false) {
                await supabase.auth.signOut();
                showAlert('⚠️ Loja suspensa. Entre em contato com a administração.', 'error');
                btnLogin.disabled  = false;
                btnLogin.innerText = 'Entrar no Painel';
                return;
            }

            saveStoreSession(data.user, profile);
            showAlert('✅ Login efetuado! Redirecionando...', 'success');
            setTimeout(() => { window.location.href = 'vendedor.html'; }, 800);
        });
    }
</script>
</body>
</html>
