<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>Login Admin - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #111; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .login-box { 
            background: #fff; 
            width: 90%; 
            max-width: 400px; 
            padding: 45px 35px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); 
        }
        
        .login-box h2 { 
            border-bottom: none; 
            margin-bottom: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
        }
        
        .form-group { margin-bottom: 18px; text-align: left; }
        label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 6px; 
            color: #777; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #e5e5e5; 
            border-radius: 10px; 
            outline: none; 
            font-size: 0.95rem; 
            background: #fdfdfd; 
            transition: all 0.3s ease;
        }
        
        input:focus { 
            border-color: #ea1d2c; 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1);
        }
        
        .btn { 
            background: linear-gradient(135deg, #ea1d2c, #ff4b58); 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            font-size: 1.1rem; 
            margin-top: 10px;
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 18px rgba(234, 29, 44, 0.35);
        }
        
        .error-msg { 
            color: #ea1d2c; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            font-weight: bold; 
            display: none; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>
            <div style="font-size: 2.8rem; font-weight: 900; font-style: italic; letter-spacing: -1px;">
                <span style="color: #ea1d2c;">Uai</span><span style="color: #111;">Pede</span>
            </div>
            <span style="font-size: 1.1rem; color: #777; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">Acesso Restrito</span>
        </h2>
        
        <div class="form-group">
            <label>E-mail do Administrador</label>
            <input type="email" id="adm-email" placeholder="Digite o seu e-mail">
        </div>
        <div class="form-group">
            <label>Palavra-passe</label>
            <input type="password" id="adm-pass" placeholder="Digite a sua palavra-passe">
        </div>
        
        <div id="error-message" class="error-msg"></div>

        <button class="btn" id="btn-login">Entrar no Painel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const errorMsg = document.getElementById('error-message');

        // Verifica se o utilizador já está logado ao carregar a página
        window.onload = () => {
            if(sessionStorage.getItem('adminAuth') === 'true') {
                window.location.href = 'adm.html';
            }
        };

        const showError = (msg) => { 
            errorMsg.innerText = msg; 
            errorMsg.style.display = 'block'; 
        };

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('adm-email').value.trim();
            const pass = document.getElementById('adm-pass').value.trim();
            
            if(!email || !pass) return showError("Por favor, preencha todos os campos.");

            try {
                // Consulta a coleção 'admins' no Firestore para validar as credenciais
                const adminsRef = collection(db, "admins");
                const q = query(adminsRef, where("email", "==", email), where("password", "==", pass));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // Credenciais corretas: define a chave de sessão e redireciona
                    sessionStorage.setItem('adminAuth', 'true');
                    window.location.href = 'adm.html';
                } else {
                    // Credenciais não encontradas no banco de dados
                    showError("Erro: E-mail ou palavra-passe incorretos.");
                }
            } catch (error) {
                console.error("Erro na autenticação:", error);
                showError("Erro técnico ao conectar com o banco de dados.");
            }
        });
    </script>
</body>
</html>
