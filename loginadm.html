<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>Login Admin - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #111; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .login-box { 
            background: #fff; 
            width: 90%; 
            max-width: 400px; 
            padding: 45px 35px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); 
        }
        
        .login-box h2 { 
            border-bottom: none; 
            margin-bottom: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
        }
        
        .form-group { margin-bottom: 18px; text-align: left; }
        label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 6px; 
            color: #777; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #e5e5e5; 
            border-radius: 10px; 
            outline: none; 
            font-size: 0.95rem; 
            background: #fdfdfd; 
            transition: all 0.3s ease;
        }
        
        input:focus { 
            border-color: #ea1d2c; 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1);
        }
        
        .btn { 
            background: linear-gradient(135deg, #ea1d2c, #ff4b58); 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            font-size: 1.1rem; 
            margin-top: 10px;
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 18px rgba(234, 29, 44, 0.35);
        }
        
        .error-msg { 
            color: #ea1d2c; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            font-weight: bold; 
            display: none; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>
            <div style="font-size: 2.8rem; font-weight: 900; font-style: italic; letter-spacing: -1px;">
                <span style="color: #ea1d2c;">Uai</span><span style="color: #111;">Pede</span>
            </div>
            <span style="font-size: 1.1rem; color: #777; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">Acesso Restrito</span>
        </h2>
        
        <div class="form-group">
            <label>E-mail do Administrador</label>
            <input type="email" id="adm-email" placeholder="Digite o seu e-mail">
        </div>
        <div class="form-group">
            <label>Palavra-passe</label>
            <input type="password" id="adm-pass" placeholder="Digite a sua palavra-passe">
        </div>
        
        <div id="error-message" class="error-msg"></div>

        <button class="btn" id="btn-login">Entrar no Painel</button>
    </div>

    <script type="module">
    import { supabase } from './js/supabase-client.js';

    // Redirect if already admin
    const { data: { session } } = await supabase.auth.getSession();
    if (session && session.user.app_metadata?.role === 'admin') {
        window.location.href = 'adm.html';
    }

    const errorMsg = document.getElementById('error-message');
    const showError = (msg) => {
        if (errorMsg) { errorMsg.innerText = msg; errorMsg.style.display = 'block'; }
        const btn = document.getElementById('btn-login');
        if (btn) { btn.innerText = 'Entrar no Painel'; btn.disabled = false; }
    };

    const btnLogin = document.getElementById('btn-login');
    if (btnLogin) {
        btnLogin.addEventListener('click', async () => {
            const email = document.getElementById('adm-email')?.value?.trim();
            const pass  = document.getElementById('adm-pass')?.value?.trim();

            if (!email || !pass) return showError('Preencha todos os campos.');
            btnLogin.innerText = 'Autenticando...';
            btnLogin.disabled  = true;
            if (errorMsg) errorMsg.style.display = 'none';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

            if (error || data.user.app_metadata?.role !== 'admin') {
                return showError('E-mail ou senha incorretos.');
            }

            window.location.href = 'adm.html';
        });
    }
</script>
</body>
</html>
