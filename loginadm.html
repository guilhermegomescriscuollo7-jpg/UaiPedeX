<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - UaiPede</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-color: #ff4757; /* Cor principal do UaiPede (ajuste se necessário) */
            --bg-color: #f1f2f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff6b81, #ff4757);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Efeito Glassmorphism */
        .login-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #fff;
        }

        .login-container h2 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: var(--primary-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .error-message {
            color: #ffeaa7;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>UaiPede Admin</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login" id="btnSubmit">Entrar</button>
            <div id="errorMsg" class="error-message">Usuário ou senha incorretos!</div>
        </form>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO SUPABASE
        // ==========================================
        // IMPORTANTE: Cole aqui suas chaves reais do projeto UaiPedeX
        const SUPABASE_URL = "https://sua-url-do-supabase.supabase.co";
        const SUPABASE_KEY = "sua-chave-anon-do-supabase";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // LÓGICA DE LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Evita que a página recarregue

            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnSubmit = document.getElementById('btnSubmit');

            // Feedback visual de carregamento
            btnSubmit.innerText = "Verificando...";
            btnSubmit.disabled = true;
            errorMsg.style.display = 'none';

            try {
                /* ATENÇÃO: Este código assume que você criou uma tabela chamada "admins"
                   no Supabase, com as colunas "usuario" e "senha".
                   Se os nomes forem diferentes, altere no código abaixo.
                */
                const { data, error } = await supabase
                    .from('admins')
                    .select('*')
                    .eq('usuario', userVal)
                    .eq('senha', passVal)
                    .single(); // Retorna apenas 1 resultado (ou erro se não achar)

                if (error || !data) {
                    // Login falhou (não encontrou no banco)
                    throw new Error("Credenciais inválidas");
                }

                // Login com sucesso!
                // Salva a sessão no navegador para o adm.js reconhecer
                sessionStorage.setItem('adminAuth', 'true');
                
                // Redireciona para o painel principal
                window.location.href = 'adm.html';

            } catch (err) {
                // Mostra mensagem de erro
                errorMsg.innerText = "Usuário ou senha incorretos!";
                errorMsg.style.display = 'block';
                console.error("Erro no login:", err);
            } finally {
                // Restaura o botão
                btnSubmit.innerText = "Entrar";
                btnSubmit.disabled = false;
            }
        });

        // ==========================================
        // VERIFICAÇÃO DE SESSÃO ATIVA
        // ==========================================
        // Se o admin já estiver logado e tentar abrir a página de login,
        // ele é redirecionado direto para o painel.
        document.addEventListener("DOMContentLoaded", () => {
            if (sessionStorage.getItem('adminAuth') === 'true') {
                window.location.href = "adm.html";
            }
        });
    </script>
</body>
</html>
