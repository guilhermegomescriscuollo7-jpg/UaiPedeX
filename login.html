<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso - UaiPede</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ea1d2c">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UaiPede">
    <link rel="apple-touch-icon" href="icone-192x192.png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f4f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #333; padding: 20px;}

        .login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        
        .logo-area { margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .logo-area h1 { font-size: 1.5rem; color: #111; font-weight: 900; }
        .logo-area p { font-size: 0.9rem; color: #777; margin-top: 5px; }

        .alert-box { display: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; font-weight: bold; }
        .alert-error { background: #fef0f0; color: #ea1d2c; border: 1px solid #fbd5d5; }
        .alert-success { background: #e6f4ea; color: #00a14b; border: 1px solid #c3e6cb; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #555; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; background: #f9f9f9; transition: 0.2s; color: #333; font-family: 'Roboto', sans-serif;}
        .form-group input:focus, .form-group select:focus { border-color: #ea1d2c; background: #fff; }

        .forgot-password { display: block; text-align: right; font-size: 0.85rem; color: #ea1d2c; text-decoration: none; margin-top: -5px; margin-bottom: 15px; font-weight: 500; cursor: pointer; }
        .forgot-password:hover { text-decoration: underline; }

        .btn-primary { width: 100%; background: #ea1d2c; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary:hover { background: #c81824; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .toggle-mode { margin-top: 20px; font-size: 0.9rem; color: #555; }
        .toggle-link { color: #ea1d2c; font-weight: bold; cursor: pointer; text-decoration: none; }
        .toggle-link:hover { text-decoration: underline; }

        .back-link { display: block; margin-top: 25px; font-size: 0.85rem; color: #999; text-decoration: none; }
        .back-link:hover { color: #555; text-decoration: underline; }

        /* Estilo para o texto explicativo da recuperação */
        .recovery-info { font-size: 0.85rem; color: #666; margin-bottom: 20px; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-area">
            <svg width="90" height="65" viewBox="0 0 100 70" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 10px;">
                <path d="M28 28 C 32 16, 42 16, 46 28" stroke="#ea1d2c" stroke-width="6" stroke-linecap="round" fill="none"/>
                <path d="M54 28 C 58 16, 68 16, 72 28" stroke="#ea1d2c" stroke-width="6" stroke-linecap="round" fill="none"/>
                <path d="M15 45 Q 50 75 85 45" stroke="#ea1d2c" stroke-width="8" stroke-linecap="round" fill="none"/>
            </svg>
            
            <h1 id="title-text">Bem-vindo(a)</h1>
            <p>UaiPede</p>
        </div>

        <div id="alert-msg" class="alert-box"></div>

        <div id="auth-section">
            <form id="auth-form">
                <div id="register-fields" style="display: none;">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="name" placeholder="Como devemos te chamar?">
                    </div>
                    <div class="form-group">
                        <label>Celular / WhatsApp</label>
                        <input type="tel" id="phone" placeholder="(37) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label>Sua Cidade</label>
                        <select id="regCity">
                            <option value="">Carregando cidades...</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="form-group" id="pass-group">
                    <label>Senha</label>
                    <input type="password" id="pass" placeholder="Sua senha" required>
                </div>

                <a id="forgot-password" class="forgot-password" onclick="window.toggleRecoveryMode()">Esqueceu a senha?</a>
                
                <button type="submit" class="btn-primary" id="btn-submit">Entrar</button>
            </form>

            <div class="toggle-mode" id="toggle-text">
                Ainda não tem conta? <span class="toggle-link" onclick="window.toggleMode()">Cadastre-se</span>
            </div>
        </div>

        <div id="recovery-section" style="display: none;">
            <p class="recovery-info">Para redefinir sua senha, confirme os dados cadastrados abaixo:</p>
            
            <div id="recovery-step-1">
                <div class="form-group">
                    <label>E-mail cadastrado</label>
                    <input type="email" id="rec-email" placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label>Celular cadastrado</label>
                    <input type="tel" id="rec-phone" placeholder="Ex: (37) 99999-9999">
                </div>
                <button type="button" class="btn-primary" id="btn-validate" onclick="window.validateRecovery()">Validar Dados</button>
            </div>

            <div id="recovery-step-2" style="display: none;">
                <div class="form-group">
                    <label>Sua Nova Senha</label>
                    <input type="password" id="rec-new-pass" placeholder="Mínimo 6 caracteres">
                </div>
                <button type="button" class="btn-primary" id="btn-reset-pass" onclick="window.updatePassword()">Salvar Nova Senha</button>
            </div>

            <div class="toggle-mode">
                <span class="toggle-link" onclick="window.toggleRecoveryMode()">← Voltar para o Login</span>
            </div>
        </div>

        <a href="index.html" class="back-link">← Voltar para a página inicial</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // Importei 'updateDoc' e 'doc' para podermos atualizar o documento do usuário
        import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if (localStorage.getItem('isLogged') === 'true') {
            window.location.href = "index.html";
        }

        const citySelect = document.getElementById('regCity');
        async function loadCities() {
            try {
                const citiesSnap = await getDocs(collection(db, "cities"));
                let cities = [];
                citiesSnap.forEach(document => { cities.push(document.data()); });
                
                cities.sort((a, b) => a.name.localeCompare(b.name));

                if (cities.length === 0) {
                    citySelect.innerHTML = '<option value="">Nenhuma cidade disponível</option>';
                    return;
                }

                citySelect.innerHTML = '<option value="">Selecione sua cidade...</option>' + 
                    cities.map(c => `<option value="${c.name} - ${c.state}">${c.name} - ${c.state}</option>`).join('');
            } catch (error) {
                console.error("Erro ao carregar cidades:", error);
                citySelect.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }
        
        loadCities();

        let isRegisterMode = false;
        
        function showAlert(msg, type) {
            const alertBox = document.getElementById('alert-msg');
            alertBox.innerText = msg;
            alertBox.className = type === 'error' ? 'alert-box alert-error' : 'alert-box alert-success';
            alertBox.style.display = 'block';
            if(type === 'error') {
                setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
            }
        }

        function saveLocalSession(userData) {
            localStorage.setItem('loggedCustomer', JSON.stringify({ 
                name: userData.name, 
                email: userData.email, 
                phone: userData.phone || '',
                city: userData.city || ''
            }));
            localStorage.setItem('isLogged', 'true');
            localStorage.setItem('userEmail', userData.email);
            localStorage.setItem('userName', userData.name);
            
            if (userData.city) {
                localStorage.setItem('userCity', userData.city);
            }
        }

        window.toggleMode = () => {
            isRegisterMode = !isRegisterMode;
            
            const title = document.getElementById('title-text');
            const btnSubmit = document.getElementById('btn-submit');
            const toggleText = document.getElementById('toggle-text');
            const registerFields = document.getElementById('register-fields');
            const forgotPassword = document.getElementById('forgot-password');
            
            if (isRegisterMode) {
                title.innerText = "Criar Conta";
                btnSubmit.innerText = "Cadastrar";
                toggleText.innerHTML = `Já tem uma conta? <span class="toggle-link" onclick="window.toggleMode()">Faça Login</span>`;
                registerFields.style.display = "block";
                forgotPassword.style.display = "none";
                
                document.getElementById('name').required = true;
                document.getElementById('phone').required = true;
                document.getElementById('regCity').required = true;
            } else {
                title.innerText = "Bem-vindo(a)";
                btnSubmit.innerText = "Entrar";
                toggleText.innerHTML = `Ainda não tem conta? <span class="toggle-link" onclick="window.toggleMode()">Cadastre-se</span>`;
                registerFields.style.display = "none";
                forgotPassword.style.display = "block";
                
                document.getElementById('name').required = false;
                document.getElementById('phone').required = false;
                document.getElementById('regCity').required = false;
            }
        };

        // ==========================================
        // LÓGICA DE RECUPERAÇÃO DE SENHA (CRUZAMENTO DE DADOS)
        // ==========================================
        let idDocumentoRecuperacao = null; // Vai guardar o ID do usuário no banco

        window.toggleRecoveryMode = () => {
            const authSection = document.getElementById('auth-section');
            const recoverySection = document.getElementById('recovery-section');
            const title = document.getElementById('title-text');

            if (recoverySection.style.display === "none") {
                // Ativar modo recuperação
                authSection.style.display = "none";
                recoverySection.style.display = "block";
                title.innerText = "Recuperar Senha";
                
                // Reseta os campos caso o usuário já tenha tentado antes
                document.getElementById('recovery-step-1').style.display = "block";
                document.getElementById('recovery-step-2').style.display = "none";
                document.getElementById('rec-email').value = document.getElementById('email').value; // Puxa o email se já tiver digitado
                document.getElementById('rec-phone').value = '';
                document.getElementById('rec-new-pass').value = '';
                idDocumentoRecuperacao = null;
                document.getElementById('alert-msg').style.display = 'none';
            } else {
                // Voltar para login
                authSection.style.display = "block";
                recoverySection.style.display = "none";
                title.innerText = isRegisterMode ? "Criar Conta" : "Bem-vindo(a)";
                document.getElementById('alert-msg').style.display = 'none';
            }
        };

        window.validateRecovery = async () => {
            const email = document.getElementById('rec-email').value.trim();
            const phone = document.getElementById('rec-phone').value.trim();
            const btn = document.getElementById('btn-validate');

            if (!email || !phone) {
                showAlert("❌ Preencha o e-mail e o celular para continuar.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procurando...";

            try {
                // Busca no banco um usuário que tenha ESSE email E ESSE telefone
                const q = query(collection(db, "customers"), where("email", "==", email), where("phone", "==", phone));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showAlert("❌ Dados incorretos ou não encontrados. Verifique a digitação.", "error");
                    btn.disabled = false;
                    btn.innerText = "Validar Dados";
                    return;
                }

                // Se achou, guarda o ID do documento do Firestore
                querySnapshot.forEach((docSnap) => {
                    idDocumentoRecuperacao = docSnap.id;
                });

                showAlert("✅ Identidade confirmada! Crie sua nova senha.", "success");
                
                // Esconde o passo 1 e mostra o passo 2 (criar senha)
                document.getElementById('recovery-step-1').style.display = "none";
                document.getElementById('recovery-step-2').style.display = "block";
                btn.disabled = false;
                btn.innerText = "Validar Dados";

            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                showAlert("❌ Erro de conexão com o servidor.", "error");
                btn.disabled = false;
                btn.innerText = "Validar Dados";
            }
        };

        window.updatePassword = async () => {
            const newPass = document.getElementById('rec-new-pass').value.trim();
            const btn = document.getElementById('btn-reset-pass');

            if (!newPass || newPass.length < 6) {
                showAlert("❌ A nova senha deve ter no mínimo 6 caracteres.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                // Atualiza APENAS o campo de senha no documento daquele usuário específico
                const userRef = doc(db, "customers", idDocumentoRecuperacao);
                await updateDoc(userRef, {
                    password: newPass
                });

                showAlert("✅ Senha atualizada com sucesso! Faça login.", "success");
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "Salvar Nova Senha";
                    // Preenche o login com os dados novos e volta pra tela inicial
                    document.getElementById('email').value = document.getElementById('rec-email').value;
                    document.getElementById('pass').value = newPass;
                    window.toggleRecoveryMode();
                }, 2000);

            } catch (error) {
                console.error("Erro ao salvar senha:", error);
                showAlert("❌ Erro ao atualizar a senha.", "error");
                btn.disabled = false;
                btn.innerText = "Salvar Nova Senha";
            }
        };

        // ==========================================
        // LÓGICA DE LOGIN E CADASTRO PADRÃO
        // ==========================================
        const form = document.getElementById('auth-form');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if (!email || !pass) {
                showAlert("❌ Preencha todos os campos obrigatórios.", "error");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Aguarde...";

            try {
                if (isRegisterMode) {
                    const name = document.getElementById('name').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    const city = document.getElementById('regCity').value;

                    if (!city) {
                        showAlert("❌ Por favor, selecione sua cidade.", "error");
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Cadastrar";
                        return;
                    }

                    const qCheck = query(collection(db, "customers"), where("email", "==", email));
                    const checkSnapshot = await getDocs(qCheck);

                    if (!checkSnapshot.empty) {
                        showAlert("❌ Este e-mail já está cadastrado. Faça login.", "error");
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Cadastrar";
                        return;
                    }

                    const newUser = { name, email, phone, city, password: pass };
                    await addDoc(collection(db, "customers"), newUser);

                    saveLocalSession(newUser);
                    showAlert("✅ Conta criada com sucesso!", "success");
                    
                    setTimeout(() => { window.location.href = "index.html"; }, 800);

                } else {
                    const q = query(collection(db, "customers"), where("email", "==", email), where("password", "==", pass));
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        showAlert("❌ E-mail ou senha incorretos.", "error");
                        document.getElementById('pass').value = '';
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Entrar";
                        return;
                    }

                    let userData = null;
                    querySnapshot.forEach((docSnap) => { userData = docSnap.data(); });

                    saveLocalSession(userData);
                    showAlert("✅ Login efetuado! Redirecionando...", "success");
                    
                    setTimeout(() => { window.location.href = "index.html"; }, 800);
                }

            } catch (error) {
                console.error("Erro na autenticação:", error);
                showAlert("❌ Erro de conexão com o servidor. Tente novamente.", "error");
                btnSubmit.disabled = false;
                btnSubmit.innerText = isRegisterMode ? "Cadastrar" : "Entrar";
            }
        });

        // ==========================================
        // Registro do Service Worker para o PWA
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker registrado com sucesso no Login.');
                    })
                    .catch((error) => {
                        console.log('Falha ao registrar o Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
